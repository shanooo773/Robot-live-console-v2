# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name anybot.brainswarmrobotics.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anybot.brainswarmrobotics.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/anybot.brainswarmrobotics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anybot.brainswarmrobotics.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # FRONTEND (Vite build output)
    root /home/shayan/Robot-live-console-v2/frontend/dist;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /auth/github/callback {
        try_files $uri /index.html;
    }
    ######################################################################
    # Theia (order-sensitive: keep these BEFORE generic static handlers) #
    ######################################################################

    # Theia service endpoints on backend (JSON)
    # Covers: /theia/status, /theia/start, /theia/workspace, and demo/status
    location ~ ^/theia/(status|start|stop|restart|schedule-cleanup|containers|workspace|demo/status|booking/start|booking/stop|admin/.*)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    # Theia IDE container proxy (dynamic port) - strip /theia/<port>/ prefix
    location ~ ^/theia/(?<port>\d+)/(.*)$ {
        # Rewrite to upstream root path so bundle and assets resolve
        rewrite ^/theia/\d+/(.*)$ /$1 break;

        # Pass to the container on the captured port (no URI part in proxy_pass)
        proxy_pass http://127.0.0.1:$port;
        proxy_http_version 1.1;

        # WebSocket/upgrade headers for Theia
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    # Handle exact /theia/<port> (no trailing path) to upstream root
    location ~ ^/theia/(?<port>\d+)$ {
        proxy_pass http://127.0.0.1:$port/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    ##########################################
    # Backend API proxied to FastAPI on 8000 #
    ##########################################

    # Covers all backend routes found in the repo:
    # - /auth/* (register, confirm, login, google, me, forgot-password, reset-password)
    # - /admin/* (users, stats, change-password, roles, deletes, robots if present)
    # - /bookings/* and /my-bookings
    # - /robots (public/admin)
    # - /messages (admin list, public create)
    # - /announcements (admin CRUD) and /announcements/active (public)
    # - /health
    # - /files and /videos (if served by backend)
    location ~ ^/(auth|admin|bookings|my-bookings|robots|messages|announcements|health|files|videos|community)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    # WebSocket proxy (if backend exposes /ws/)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    #####################################################
    # Static asset caching (keep AFTER Theia/API blocks)#
    #####################################################

    # Disable JS/CSS caching during debugging
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Images, fonts
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/anybot_access.log;
    error_log  /var/log/nginx/anybot_error.log;
}
