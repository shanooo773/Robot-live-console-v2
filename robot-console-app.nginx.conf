# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name anybot.brainswarmrobotics.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anybot.brainswarmrobotics.com;

    # SSL certificates (Certbot paths)
    ssl_certificate /etc/letsencrypt/live/anybot.brainswarmrobotics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anybot.brainswarmrobotics.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # FRONTEND
    root /home/shayan/Robot-live-console-v2/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    }

    # GitHub OAuth callback must be handled by frontend SPA route
    location = /auth/github/callback {
        try_files $uri /index.html;
    }

    # During debugging: disable JS/CSS caching so new builds load
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Backend API proxied to FastAPI on 8000
    location ~ ^/(auth|admin|api|robots|bookings|users|sessions|messages|health|community)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Theia IDE reverse proxy on same origin: /theia/<port>/...
    location ~ ^/theia/(?<port>\d+)/(.*)$ {
        proxy_pass http://127.0.0.1:$port/$2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location ~ ^/theia/(?<port>\d+)$ {
        proxy_pass http://127.0.0.1:$port/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    access_log /var/log/nginx/anybot_access.log;
    error_log  /var/log/nginx/anybot_error.log;
}
